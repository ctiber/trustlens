worker_processes auto;

events {
  worker_connections 16384;
  use epoll;
  multi_accept on;
}

http {
  # mTLS upstreams — nginx presents its client cert on every proxied connection
  upstream ms_user {
    server ms-user:8081;
    keepalive 32;
  }
  upstream ms_location {
    server ms-location:8082;
    keepalive 32;
  }

  server {
    listen 8080;
    keepalive_requests 10000;
    keepalive_timeout  65;

    # ── ms-user routes ────────────────────────────────────────────────────────
    location /auth/ {
      proxy_pass         https://ms_user;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_ssl_certificate          /etc/nginx/certs/gateway/cert.pem;
      proxy_ssl_certificate_key      /etc/nginx/certs/gateway/key.pem;
      proxy_ssl_trusted_certificate  /etc/nginx/certs/ca.crt;
      proxy_ssl_verify        on;
      proxy_ssl_session_reuse on;
      proxy_ssl_name          ms-user;
    }

    location /users/ {
      proxy_pass         https://ms_user;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   Authorization     $http_authorization;
      proxy_ssl_certificate          /etc/nginx/certs/gateway/cert.pem;
      proxy_ssl_certificate_key      /etc/nginx/certs/gateway/key.pem;
      proxy_ssl_trusted_certificate  /etc/nginx/certs/ca.crt;
      proxy_ssl_verify        on;
      proxy_ssl_session_reuse on;
      proxy_ssl_name          ms-user;
    }

    # ── ms-location routes ────────────────────────────────────────────────────
    location /location/ {
      proxy_pass         https://ms_location;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   Authorization     $http_authorization;
      proxy_ssl_certificate          /etc/nginx/certs/gateway/cert.pem;
      proxy_ssl_certificate_key      /etc/nginx/certs/gateway/key.pem;
      proxy_ssl_trusted_certificate  /etc/nginx/certs/ca.crt;
      proxy_ssl_verify        on;
      proxy_ssl_session_reuse on;
      proxy_ssl_name          ms-location;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
      return 200 "gateway ok\n";
      add_header Content-Type text/plain;
    }
  }
}
