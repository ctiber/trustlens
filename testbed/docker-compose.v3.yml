version: "3.9"

# ── V3 override — Enhanced Zero Trust ────────────────────────────────────────
# Adds Vault for dynamic secret rotation; enables mTLS and RiskEvaluator.
# Usage: docker-compose -f docker-compose.yml -f docker-compose.v3.yml up

services:

  vault:
    image: hashicorp/vault:1.15
    cap_add: [IPC_LOCK]
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    networks: [trustlens-net]

  # Switch nginx to the v3 config (HTTPS upstream + mTLS client cert)
  api-gateway:
    volumes:
      - ./gateway/nginx-v3.conf:/etc/nginx/nginx.conf:ro
      - ./certs/gateway:/etc/nginx/certs/gateway:ro
      - ./certs/ca.crt:/etc/nginx/certs/ca.crt:ro

  ms-user:
    environment:
      SPRING_PROFILES_ACTIVE: v3
      VAULT_URI: http://vault:8200
      VAULT_TOKEN: root-token
    volumes:
      - ./certs/ms-user:/certs:ro
    depends_on:
      - vault

  ms-location:
    environment:
      SPRING_PROFILES_ACTIVE: v3
      VAULT_URI: http://vault:8200
      VAULT_TOKEN: root-token
    volumes:
      - ./certs/ms-location:/certs:ro
    depends_on:
      - vault

  ms-proximity-detection:
    environment:
      SPRING_PROFILES_ACTIVE: v3
      VAULT_URI: http://vault:8200
      VAULT_TOKEN: root-token
    volumes:
      - ./certs/ms-proximity-detection:/certs:ro
    depends_on:
      - vault

  ms-notification:
    environment:
      SPRING_PROFILES_ACTIVE: v3
      VAULT_URI: http://vault:8200
      VAULT_TOKEN: root-token
    depends_on:
      - vault
