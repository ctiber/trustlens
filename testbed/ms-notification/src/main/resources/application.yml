server:
  port: 8084

spring:
  application:
    name: ms-notification
  cloud:
    vault:
      enabled: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

kafka:
  topic:
    violations: proximity.violation.detected

# ── V1 Profile ────────────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: v1
  cloud:
    vault:
      enabled: false

trustlens:
  profile: v1

# ── V2 Profile ────────────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: v2
  cloud:
    vault:
      enabled: false

trustlens:
  profile: v2

# ── V3 Profile ────────────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: v3
  cloud:
    vault:
      enabled: true
      uri: ${VAULT_URI:http://localhost:8200}
      token: ${VAULT_TOKEN:root-token}
      kv:
        enabled: true
        backend: secret
        default-context: ms-notification

trustlens:
  profile: v3
